[pytest]
# Tier 1 (unit/logic) tests live in tests/ and run everywhere with no services.
# Tier 2 (integration) tests live in tests/integration/ and are marked so they
# can be selected or skipped explicitly:
#   pytest -m "not integration"   # Tier 1 only (default-safe, no Docker)
#   pytest -m integration         # Tier 2 only (needs Postgres + Redis)
testpaths = tests
markers =
    integration: requires live PostgreSQL (pgvector) and Redis (see docker-compose.test.yml)
asyncio_mode = auto
addopts = -ra
filterwarnings =
    # Starlette's TestClient emits this deprecation about httpx at import time;
    # third-party and outside our control. Match the exact warning category
    # (message/module filters miss it -- it fires from fastapi.testclient during
    # collection, before those filters apply).
    ignore::starlette.exceptions.StarletteDeprecationWarning

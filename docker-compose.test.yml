# Tier 2 integration backing services: real PostgreSQL+pgvector and Redis.
#
#   docker compose -f docker-compose.test.yml up -d
#   # wait for healthy, then:
#   PG_HOST=localhost PG_PORT=5433 REDIS_HOST=localhost REDIS_PORT=6380 \
#     pytest -m integration
#   docker compose -f docker-compose.test.yml down -v
#
# Ports are offset (5433/6380) so they don't collide with a local dev Postgres/Redis.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: faces
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    # Load schema.sql (pgvector extension + faces table) at first init.
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faces"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15
